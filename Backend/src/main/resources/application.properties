# En producción (Railway) se usa la variable PORT que inyecta la plataforma; en local, 8080.
server.port=${PORT:8080}
spring.application.name=demo

# URL del frontend permitida por CORS (en prod: dominio de Vercel/Railway)
app.frontend.url=${APP_FRONTEND_URL:http://localhost:5173}

# Credenciales: se cargan desde Backend/secrets.properties (NO versionado, ver secrets.properties.example)
spring.config.import=optional:file:./secrets.properties,optional:file:./Backend/secrets.properties

# En local usa MySQL local; en Railway se sobreescriben con las variables SPRING_DATASOURCE_*
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/transportes_rayza}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}
# Hibernate nunca toca el esquema: las migraciones se aplican a mano
# (ver Backend/sql/README.md). Para comprobar que la base está al día usa
# Backend/sql/verificar-esquema.sql, que avisa si falta alguna columna.
#
# JPA_DDL_AUTO=validate haría que la app no arranque con la base desactualizada,
# pero hoy no pasa: el esquema usa smallint/text donde las entidades declaran
# Integer/String (25 diferencias que no afectan al funcionamiento). Se puede
# activar cuando esos tipos se normalicen.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:none}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
jwt.secret=${JWT_SECRET:}
jwt.expiration=86400000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=transprayza@gmail.com
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Topes de tiempo: sin esto, si el puerto SMTP está bloqueado (Railway lo bloquea en
# los planes Free/Hobby) la conexión se queda colgada ~90s y arrastra al pago que la
# dispara. Con esto falla en ~8s y la venta sigue su curso.
spring.mail.properties.mail.smtp.connectiontimeout=8000
spring.mail.properties.mail.smtp.timeout=8000
spring.mail.properties.mail.smtp.writetimeout=8000

# ── Nubefact (facturacion electronica) ──
# La ruta y el token vienen de secrets.properties (no versionado)
nubefact.enabled=true
nubefact.url=${NUBEFACT_URL:}
nubefact.token=${NUBEFACT_TOKEN:}

# Consulta de DNI / RUC (apisperu)
apisperu.token=${APISPERU_TOKEN:}

# ── Izipay (pasarela de pago en línea, compra del cliente) ──
# Pasarela Izipay (formulario embebido). Sin credenciales trabaja en MODO SIMULACIÓN:
# no cobra, pero deja probar todo el flujo de compra.
# Las cuatro claves salen del Back Office Vendedor de Izipay.
izipay.enabled=${IZIPAY_ENABLED:false}
izipay.username=${IZIPAY_USERNAME:}
izipay.password=${IZIPAY_PASSWORD:}
izipay.public-key=${IZIPAY_PUBLIC_KEY:}
izipay.hmac-sha256=${IZIPAY_HMAC_SHA256:}
izipay.endpoint=${IZIPAY_ENDPOINT:https://api.micuentaweb.pe}

# ── Yape por Mercado Pago (segundo medio de pago del cliente) ──
# El access token es PRIVADO y nunca debe llegar al navegador; la clave pública sí.
mercadopago.enabled=${MERCADOPAGO_ENABLED:false}
mercadopago.access-token=${MERCADOPAGO_ACCESS_TOKEN:}
mercadopago.public-key=${MERCADOPAGO_PUBLIC_KEY:}
mercadopago.endpoint=${MERCADOPAGO_ENDPOINT:https://api.mercadopago.com}
# Series de comprobantes.
# MODO DEMO de Nubefact: solo acepta FFF1 (facturas) y BBB1 (boletas), tambien para notas de credito.
# Cuando pases a PRODUCCION, cambia a las series configuradas en tu panel (ej. F001, B001, FC01, BC01).
nubefact.serie.factura=FFF1
nubefact.serie.boleta=BBB1
nubefact.serie.nc-factura=FFF1
nubefact.serie.nc-boleta=BBB1
