# Perfil de test: base H2 en memoria (compatible MySQL), esquema generado desde las entidades
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

jwt.secret=clave-de-prueba-solo-para-tests-256-bits-como-minimo!!
jwt.expiration=86400000

nubefact.enabled=false
nubefact.serie.factura=F001
nubefact.serie.boleta=B001
nubefact.serie.nc-factura=FC01
nubefact.serie.nc-boleta=BC01

spring.mail.host=localhost
spring.mail.port=2525
spring.mail.username=test
spring.mail.password=test
