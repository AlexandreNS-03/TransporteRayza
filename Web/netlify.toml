# Configuración de Netlify para la web del cliente (dominio principal).
# En Netlify, este sitio debe tener "Base directory" = Web

[build]
  command = "npm run build"
  publish = "dist"

# React Router (SPA): cualquier ruta cae en index.html.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Variables de entorno (Site settings → Environment variables):
#   VITE_API_URL = https://transporterayza-production.up.railway.app
#
# Izipay no necesita variables acá: su clave pública la envía el backend con cada
# compra, y las credenciales viven solo en el servidor (IZIPAY_* en Railway).
